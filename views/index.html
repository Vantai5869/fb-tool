<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook Group Posts</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #1c1e21; }

  .header {
    background: #1877f2; color: white; padding: 14px 24px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header .subtitle { font-size: 13px; opacity: .8; }

  .toolbar {
    max-width: 680px; margin: 16px auto 0; padding: 0 16px;
    display: flex; gap: 10px; align-items: center;
  }
  .toolbar select, .toolbar button { padding: 8px 16px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; }
  .toolbar select { background: white; border: 1px solid #ddd; }
  .btn-refresh { background: #1877f2; color: white; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .btn-refresh:hover { background: #166fe5; }
  .status-text { font-size: 13px; color: #65676b; margin-left: auto; }

  .auto-refresh-wrap { display: flex; align-items: center; gap: 6px; }
  .btn-auto {
    padding: 8px 14px; border-radius: 8px; border: 2px solid #1877f2;
    background: white; color: #1877f2; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s;
  }
  .btn-auto.active { background: #1877f2; color: white; }
  .btn-auto:hover { opacity: .85; }
  #intervalInput { width: 52px; padding: 7px 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; text-align: center; }
  .unit { font-size: 13px; color: #65676b; }

  .group-bar, .tg-bar {
    max-width: 680px; margin: 10px auto 0; padding: 10px 16px;
    background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.1);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .group-bar-label, .tg-bar-label { font-size: 13px; font-weight: 600; color: #444; white-space: nowrap; }
  .group-tags, .tg-tags { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }

  .group-tag {
    display: flex; align-items: center; gap: 5px;
    background: #e7f3ff; color: #1877f2;
    border-radius: 20px; padding: 4px 10px; font-size: 13px; font-weight: 500;
  }
  .group-tag .remove { cursor: pointer; font-size: 14px; color: #1877f2; opacity: .6; line-height: 1; }
  .group-tag .remove:hover { opacity: 1; }

  .tg-tag {
    display: flex; align-items: center; gap: 5px;
    background: #e8f5fd; color: #229ed9;
    border-radius: 20px; padding: 4px 10px; font-size: 13px; font-weight: 500;
  }
  .tg-tag .remove { cursor: pointer; font-size: 13px; opacity: .6; line-height: 1; }
  .tg-tag .remove:hover { opacity: 1; }
  .tg-tag .test-btn {
    cursor: pointer; font-size: 11px; background: #229ed9; color: white;
    border-radius: 8px; padding: 1px 6px; margin-left: 2px;
  }
  .tg-tag .test-btn:hover { background: #1a8bbf; }

  .group-input-wrap, .tg-input-wrap { display: flex; gap: 6px; align-items: center; }
  .group-input-wrap input { padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 13px; width: 160px; }
  .tg-input-wrap input { padding: 6px 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 13px; width: 140px; }
  .group-input-wrap button { padding: 6px 12px; border-radius: 8px; border: none; background: #1877f2; color: white; font-size: 16px; cursor: pointer; font-weight: 700; }
  .group-input-wrap button:hover { background: #166fe5; }
  .btn-tg-add { padding: 6px 12px; border-radius: 8px; border: none; background: #229ed9; color: white; font-size: 16px; font-weight: 700; cursor: pointer; }
  .btn-tg-add:hover { background: #1a8bbf; }

  .badge-group { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #e7f3ff; color: #1877f2; font-weight: 600; }
  .tg-hint { font-size: 11px; color: #888; width: 100%; padding-top: 2px; }
  .tg-status { font-size: 12px; color: #65676b; }
  .tg-noti-badge { display: inline-block; background: #229ed9; color: white; border-radius: 12px; padding: 2px 8px; font-size: 11px; font-weight: 600; }

  .kw-bar {
    max-width: 680px; margin: 10px auto 0; padding: 10px 16px;
    background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.1);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .kw-bar-label { font-size: 13px; font-weight: 600; color: #444; white-space: nowrap; }
  .kw-tags { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
  .kw-tag {
    display: flex; align-items: center; gap: 5px;
    background: #fff0e6; color: #e67e22;
    border-radius: 20px; padding: 4px 10px; font-size: 13px; font-weight: 500;
  }
  .kw-tag .remove { cursor: pointer; font-size: 13px; opacity: .6; line-height: 1; }
  .kw-tag .remove:hover { opacity: 1; }
  .kw-input-wrap { display: flex; gap: 6px; align-items: center; }
  .kw-input-wrap input { padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 13px; width: 150px; }
  .btn-kw-add { padding: 6px 12px; border-radius: 8px; border: none; background: #e67e22; color: white; font-size: 16px; font-weight: 700; cursor: pointer; }
  .btn-kw-add:hover { background: #cf6d17; }
  .kw-hint { font-size: 11px; color: #888; }
  .kw-highlight { background: #fff3cd; border-radius: 3px; padding: 0 2px; font-weight: 600; }

  .comment-input-section { padding: 8px 16px 12px; border-top: 1px solid #f0f2f5; }
  .comment-input-toggle { font-size: 13px; color: #1877f2; cursor: pointer; font-weight: 600; display: inline-block; }
  .comment-input-toggle:hover { text-decoration: underline; }
  .comment-input-wrap { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
  .comment-textarea {
    width: 100%; padding: 8px 12px; border-radius: 10px; border: 1px solid #ddd;
    font-size: 14px; font-family: inherit; resize: vertical; min-height: 60px; outline: none;
  }
  .comment-textarea:focus { border-color: #1877f2; }
  .comment-actions { display: flex; align-items: center; gap: 8px; }
  .btn-comment-send {
    padding: 7px 18px; border-radius: 8px; border: none;
    background: #1877f2; color: white; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .btn-comment-send:hover { background: #166fe5; }
  .btn-comment-send:disabled { opacity: .6; cursor: not-allowed; }
  .comment-result { font-size: 12px; color: #65676b; }

  .feed { max-width: 680px; margin: 0 auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }

  .card { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.1); overflow: hidden; animation: fadeIn .3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .card-header { padding: 14px 16px 10px; display: flex; align-items: flex-start; gap: 10px; }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, #1877f2, #42b72a);
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 16px; flex-shrink: 0;
  }
  .author-info { flex: 1; }
  .author-name { font-weight: 600; font-size: 15px; color: #050505; }
  .post-meta { font-size: 12px; color: #65676b; margin-top: 2px; display: flex; align-items: center; gap: 6px; }
  .post-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: #65676b; }

  .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .badge-published { background: #e7f3e8; color: #1a7f37; }
  .badge-pending { background: #fff3cd; color: #856404; }

  .card-body { padding: 0 16px 12px; }
  .post-text { font-size: 15px; line-height: 1.5; color: #1c1e21; white-space: pre-wrap; word-break: break-word; }
  .post-text.collapsed { display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
  .see-more { color: #1877f2; cursor: pointer; font-size: 14px; margin-top: 4px; display: inline-block; }
  .see-more:hover { text-decoration: underline; }

  .attachment { margin-top: 10px; border-radius: 8px; overflow: hidden; }
  .attachment img { width: 100%; max-height: 400px; object-fit: cover; display: block; cursor: pointer; }
  .attachment img:hover { opacity: .95; }

  .engagement { padding: 8px 16px; border-top: 1px solid #f0f2f5; border-bottom: 1px solid #f0f2f5; display: flex; gap: 20px; font-size: 14px; color: #65676b; }
  .eng-item { display: flex; align-items: center; gap: 5px; }
  .eng-icon { font-size: 16px; }

  .comments-section { padding: 10px 16px 14px; }
  .comments-toggle { font-size: 14px; color: #1877f2; cursor: pointer; font-weight: 600; margin-bottom: 8px; }
  .comments-toggle:hover { text-decoration: underline; }
  .comment { display: flex; gap: 8px; margin-bottom: 8px; }
  .comment-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, #f7971e, #ffd200);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .comment-bubble { background: #f0f2f5; border-radius: 18px; padding: 8px 12px; flex: 1; }
  .comment-author { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
  .comment-text { font-size: 14px; line-height: 1.4; }

  .post-link { padding: 10px 16px 14px; }
  .post-link a { font-size: 13px; color: #65676b; text-decoration: none; }
  .post-link a:hover { text-decoration: underline; color: #1877f2; }

  .skeleton { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
  .skel-line { background: #e4e6eb; border-radius: 4px; margin-bottom: 10px; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  .empty { text-align: center; padding: 60px 20px; color: #65676b; }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }

  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 1000; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 4px; }
  .lightbox-close { position: absolute; top: 16px; right: 20px; color: white; font-size: 32px; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <div style="font-size:28px">👥</div>
  <div>
    <h1>Facebook Group Posts</h1>
    <div class="subtitle" id="headerSubtitle">Quản lý bài viết nhóm Facebook</div>
  </div>
</div>

<div class="toolbar">
  <select id="limitSelect">
    <option value="5">5 bài</option>
    <option value="10" selected>10 bài</option>
    <option value="20">20 bài</option>
    <option value="50">50 bài</option>
  </select>
  <button class="btn-refresh" onclick="loadPosts()">
    <span id="refreshIcon">🔄</span> Tải bài viết
  </button>
  <div class="auto-refresh-wrap">
    <button class="btn-auto" id="btnAuto" onclick="toggleAutoRefresh()">⏱ Tự động</button>
    <input type="number" id="intervalInput" value="5" min="1" max="60">
    <span class="unit">phút</span>
  </div>
  <span class="status-text" id="statusText"></span>
</div>

<div class="group-bar">
  <div class="group-bar-label">📋 Group IDs</div>
  <div id="groupTags" class="group-tags"></div>
  <div class="group-input-wrap">
    <input type="text" id="groupInput" placeholder="ID hoặc URL nhóm + Enter" />
    <button onclick="addGroup()">＋</button>
  </div>
</div>

<div class="kw-bar">
  <div class="kw-bar-label">🔍 Từ khoá</div>
  <div id="kwTags" class="kw-tags"></div>
  <div class="kw-input-wrap">
    <input type="text" id="kwInput" placeholder="Nhập từ khoá + Enter" />
    <button class="btn-kw-add" onclick="addKeyword()">＋</button>
  </div>
  <span class="kw-hint" id="kwHint"></span>
</div>

<div class="tg-bar">
  <div class="tg-bar-label">✈️ Telegram</div>
  <div id="tgTags" class="tg-tags"></div>
  <div class="tg-input-wrap">
    <input type="text" id="tgChatInput" placeholder="Chat ID" />
    <button class="btn-tg-add" onclick="addTgChatId()">＋</button>
  </div>
  <span class="tg-status" id="tgStatus"></span>
  <div class="tg-hint">💡 Nhắn <b>/start</b> cho <b>@fb_noti_tai_bot</b> để nhận Chat ID tự động</div>
</div>

<div class="feed" id="feed">
  <div class="skeleton">
    <div class="skel-line" style="width:40%;height:14px"></div>
    <div class="skel-line" style="width:100%;height:12px"></div>
    <div class="skel-line" style="width:85%;height:12px"></div>
  </div>
  <div class="skeleton">
    <div class="skel-line" style="width:35%;height:14px"></div>
    <div class="skel-line" style="width:100%;height:12px"></div>
    <div class="skel-line" style="width:90%;height:12px"></div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">✕</span>
  <img id="lightboxImg" src="">
</div>

<script>
// ── Helpers ──────────────────────────────────────────
function timeAgo(isoStr) {
  const diff = Math.floor((Date.now() - new Date(isoStr)) / 1000);
  if (diff < 60) return diff + ' giây trước';
  if (diff < 3600) return Math.floor(diff/60) + ' phút trước';
  if (diff < 86400) return Math.floor(diff/3600) + ' giờ trước';
  if (diff < 2592000) return Math.floor(diff/86400) + ' ngày trước';
  return new Date(isoStr).toLocaleDateString('vi-VN');
}
function getInitial(name) {
  if (!name) return '?';
  return name.trim().split(' ').pop()[0].toUpperCase();
}
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

// ── Render post ───────────────────────────────────────
function renderPost(post) {
  const author = post.from || {};
  const authorName = author.name || 'Ẩn danh';
  const isHidden = post.is_hidden;
  const reactions = post.reactions?.summary?.total_count || 0;
  const shares = post.shares?.count || 0;
  const commentsData = post.comments || {};
  const commentsList = commentsData.data || [];
  const commentsCount = commentsData.summary?.total_count || 0;
  const text = post.message || '';
  const needsExpand = text.length > 300;
  const postId = post.id.split('_')[1] || post.id;

  const atts = (post.attachments || {}).data || [];
  const attachmentsHTML = atts.map(att => {
    if (att.type === 'photo') {
      const src = att.media?.image?.src || '';
      return src ? `<div class="attachment"><img src="${src}" onclick="openLightbox('${src}')" loading="lazy"></div>` : '';
    }
    if (att.type === 'video') {
      const src = att.media?.source || '';
      return src ? `<div class="attachment" style="padding:10px;background:#f0f2f5;border-radius:8px;font-size:13px">🎥 <a href="${src}" target="_blank">Xem video</a></div>` : '';
    }
    if (['share','link'].includes(att.type)) {
      const url = att.url || '';
      return url ? `<div class="attachment" style="padding:10px;background:#f0f2f5;border-radius:8px;font-size:13px">🔗 <a href="${url}" target="_blank">${url.substring(0,60)}...</a></div>` : '';
    }
    return '';
  }).join('');

  const commentsHTML = commentsList.map(c => {
    const cName = (c.from || {}).name || 'Ẩn danh';
    return `<div class="comment">
      <div class="comment-avatar">${getInitial(cName)}</div>
      <div class="comment-bubble">
        <div class="comment-author">${cName}</div>
        <div class="comment-text">${c.message || ''}</div>
      </div>
    </div>`;
  }).join('');

  const commentsSection = commentsCount > 0 ? `
    <div class="comments-section">
      <div class="comments-toggle" onclick="toggleComments(this)">${commentsCount} bình luận ▼</div>
      <div class="comments-list" style="display:none">${commentsHTML || '<div style="color:#65676b;font-size:13px">Chưa tải được bình luận</div>'}</div>
    </div>` : '';

  const groupBadge = post._group_id && groups.length > 1
    ? `<span class="dot"></span><span class="badge-group">📋 ${post._group_id}</span>` : '';

  return `<div class="card">
    <div class="card-header">
      <div class="avatar">${getInitial(authorName)}</div>
      <div class="author-info">
        <div class="author-name">${authorName}</div>
        <div class="post-meta">
          <span>${timeAgo(post.created_time)}</span>
          <span class="dot"></span>
          <span class="badge ${isHidden ? 'badge-pending' : 'badge-published'}">${isHidden ? '⏳ Chờ duyệt' : '✅ Đã đăng'}</span>
          ${groupBadge}
        </div>
      </div>
    </div>
    <div class="card-body">
      ${text ? `<div class="post-text ${needsExpand ? 'collapsed' : ''}" id="text-${postId}">${highlightText(text)}</div>
      ${needsExpand ? `<span class="see-more" onclick="expandText('text-${postId}',this)">Xem thêm</span>` : ''}` : ''}
      ${attachmentsHTML}
    </div>
    <div class="engagement">
      <div class="eng-item"><span class="eng-icon">❤️</span> ${reactions}</div>
      <div class="eng-item"><span class="eng-icon">💬</span> ${commentsCount}</div>
      <div class="eng-item"><span class="eng-icon">↗️</span> ${shares}</div>
    </div>
    ${commentsSection}
    <div class="post-link"><a href="${post.permalink_url || '#'}" target="_blank">🔗 Xem trên Facebook</a></div>
    <div class="comment-input-section">
      <span class="comment-input-toggle" onclick="toggleCommentBox(this)">✏️ Viết bình luận</span>
      <div class="comment-input-wrap" style="display:none">
        <textarea class="comment-textarea" placeholder="Nhập bình luận..."></textarea>
        <div class="comment-actions">
          <button class="btn-comment-send" onclick="submitComment('${post.id}','${post._group_id}',this)">Gửi</button>
          <span class="comment-result"></span>
        </div>
      </div>
    </div>
  </div>`;
}

function expandText(id, el) { document.getElementById(id).classList.remove('collapsed'); el.remove(); }
function toggleComments(el) {
  const list = el.nextElementSibling;
  const open = list.style.display === 'none';
  list.style.display = open ? 'block' : 'none';
  el.textContent = el.textContent.replace(open ? '▼' : '▲', open ? '▲' : '▼');
}

// ── Load posts ────────────────────────────────────────
async function loadPosts() {
  const limit = document.getElementById('limitSelect').value;
  const feed = document.getElementById('feed');
  const icon = document.getElementById('refreshIcon');
  const status = document.getElementById('statusText');
  const skel = `<div class="skeleton">
    <div class="skel-line" style="width:40%;height:14px"></div>
    <div class="skel-line" style="width:100%;height:12px;margin-top:14px"></div>
    <div class="skel-line" style="width:80%;height:12px"></div>
  </div>`;

  icon.style.animation = 'spin 1s linear infinite';
  document.head.insertAdjacentHTML('beforeend','<style>@keyframes spin{to{transform:rotate(360deg)}}</style>');
  status.textContent = 'Đang tải...';
  feed.innerHTML = skel.repeat(3);

  try {
    const res = await fetch(`/api/posts?limit=${limit}&groups=${groups.join(',')}`);
    const data = await res.json();

    if (data.error) {
      feed.innerHTML = `<div class="empty"><div class="icon">🍪</div><p style="font-weight:600;margin-bottom:8px">Lỗi xác thực</p><p style="font-size:13px;color:#65676b">${data.error}</p></div>`;
      status.textContent = 'Lỗi'; return;
    }
    if (!data.length) {
      feed.innerHTML = `<div class="empty"><div class="icon">📭</div><p>Không có bài viết nào</p></div>`;
      status.textContent = '0 bài'; return;
    }

    _allPosts = data;
    applyFilter();
    const now = new Date().toLocaleTimeString('vi-VN');
    const knownIds = JSON.parse(localStorage.getItem('seenPostIds') || '[]');
    const knownSet = new Set(knownIds);
    const fresh = data.filter(p => !knownSet.has(p.id));
    data.forEach(p => knownSet.add(p.id));
    localStorage.setItem('seenPostIds', JSON.stringify([...knownSet].slice(-500)));
    const badge = fresh.length > 0 && knownIds.length > 0 ? ` <span class="tg-noti-badge">+${fresh.length} mới</span>` : '';
    status.innerHTML = `${data.length} bài · ${now}${badge}`;
    status.dataset.base = `${data.length} bài · ${now}`;
  } catch {
    feed.innerHTML = `<div class="empty"><div class="icon">⚠️</div><p>Lỗi kết nối server</p></div>`;
    status.textContent = 'Lỗi';
  } finally {
    icon.style.animation = '';
  }
}

// ── Auto refresh ──────────────────────────────────────
let autoTimer = null, countdownTimer = null, secondsLeft = 0;

function toggleAutoRefresh() { autoTimer ? stopAutoRefresh() : startAutoRefresh(); }

function startAutoRefresh() {
  const minutes = parseInt(document.getElementById('intervalInput').value) || 5;
  if (minutes < 1) return;
  document.getElementById('btnAuto').classList.add('active');
  document.getElementById('btnAuto').textContent = '⏹ Dừng';
  document.getElementById('intervalInput').disabled = true;
  scheduleNext(minutes * 60);
}

function stopAutoRefresh() {
  clearTimeout(autoTimer); clearInterval(countdownTimer);
  autoTimer = countdownTimer = null;
  document.getElementById('btnAuto').classList.remove('active');
  document.getElementById('btnAuto').textContent = '⏱ Tự động';
  document.getElementById('intervalInput').disabled = false;
  const st = document.getElementById('statusText');
  st.textContent = st.dataset.base || st.textContent;
}

function scheduleNext(seconds) {
  secondsLeft = seconds;
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => { if (--secondsLeft <= 0) clearInterval(countdownTimer); updateCountdown(); }, 1000);
  autoTimer = setTimeout(() => {
    loadPosts().then(() => scheduleNext((parseInt(document.getElementById('intervalInput').value) || 5) * 60));
  }, seconds * 1000);
}

function updateCountdown() {
  const status = document.getElementById('statusText');
  const base = status.dataset.base || status.textContent.replace(/ [(].*[)]$/, '');
  status.dataset.base = base;
  const m = Math.floor(secondsLeft / 60), s = secondsLeft % 60;
  status.textContent = base + (m > 0 ? ` (tải lại sau ${m}p${s}s)` : ` (tải lại sau ${s}s)`);
}

// ── Group management ──────────────────────────────────
let groups = ['3809441172650624'];

function renderGroupTags() {
  document.getElementById('groupTags').innerHTML = groups.map(gid =>
    `<div class="group-tag"><span>${gid}</span><span class="remove" onclick="removeGroup('${gid}')">✕</span></div>`
  ).join('');
  document.getElementById('headerSubtitle').textContent = groups.length === 1
    ? `Nhóm: ${groups[0]}` : `${groups.length} nhóm đang theo dõi`;
}

function extractGroupSlug(raw) {
  try {
    const url = new URL(raw.includes('://') ? raw : 'https://' + raw);
    const parts = url.pathname.split('/').filter(Boolean);
    const idx = parts.indexOf('groups');
    if (idx !== -1 && parts[idx + 1]) return parts[idx + 1].replace(/[^a-zA-Z0-9._-]/g, '');
  } catch {}
  return raw.trim().replace(/[^a-zA-Z0-9._-]/g, '');
}

async function addGroup() {
  const input = document.getElementById('groupInput');
  const raw = input.value.trim();
  if (!raw) return;
  input.value = '';
  input.disabled = true;
  const slug = extractGroupSlug(raw);

  if (/^[0-9]+$/.test(slug)) {
    if (!groups.includes(slug)) { groups.push(slug); renderGroupTags(); }
    input.disabled = false; return;
  }

  const status = document.getElementById('statusText');
  const prev = status.dataset.base || status.textContent;
  status.textContent = `🔍 Đang tìm ID cho "${slug}"...`;
  try {
    const r = await fetch(`/api/groups/resolve?slug=${encodeURIComponent(slug)}`);
    const d = await r.json();
    if (d.ok) {
      if (!groups.includes(d.id)) { groups.push(d.id); renderGroupTags(); }
      status.textContent = d.name ? `✅ Đã thêm: ${d.name} (${d.id})` : `✅ Đã thêm ${d.id}`;
    } else {
      status.textContent = `❌ Không tìm được: ${d.error}`;
    }
  } catch { status.textContent = '❌ Lỗi kết nối'; }
  setTimeout(() => { status.textContent = prev; }, 4000);
  input.disabled = false;
}

function removeGroup(gid) {
  if (groups.length <= 1) return;
  groups = groups.filter(g => g !== gid);
  renderGroupTags();
}

document.getElementById('groupInput').addEventListener('keydown', e => { if (e.key === 'Enter') addGroup(); });

// ── Telegram management ───────────────────────────────
let tgChatIds = [];

function renderTgTags() {
  document.getElementById('tgTags').innerHTML = tgChatIds.map(cid =>
    `<div class="tg-tag">
      <span>${cid}</span>
      <span class="test-btn" onclick="testTg('${cid}')">Test</span>
      <span class="remove" onclick="removeTgChatId('${cid}')">✕</span>
    </div>`
  ).join('');
}

async function loadTgChatIds() {
  const r = await fetch('/api/telegram/chatids');
  tgChatIds = await r.json();
  renderTgTags();
}

async function addTgChatId() {
  const input = document.getElementById('tgChatInput');
  const cid = input.value.trim().replace(/[^0-9-]/g, '');
  if (!cid) return;
  input.value = '';
  const r = await fetch('/api/telegram/chatids', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ chat_id: cid })
  });
  const d = await r.json();
  if (d.ok) { tgChatIds = d.chat_ids; renderTgTags(); }
}

async function removeTgChatId(cid) {
  const r = await fetch(`/api/telegram/chatids/${cid}`, { method: 'DELETE' });
  const d = await r.json();
  tgChatIds = d.chat_ids;
  renderTgTags();
}

async function testTg(cid) {
  const st = document.getElementById('tgStatus');
  st.textContent = '⏳ Đang gửi...';
  try {
    const r = await fetch(`/api/telegram/test/${cid}`, { method: 'POST' });
    const d = await r.json();
    st.textContent = d.ok ? '✅ Gửi thành công!' : '❌ ' + (d.error || 'Lỗi');
  } catch { st.textContent = '❌ Lỗi kết nối'; }
  setTimeout(() => { st.textContent = ''; }, 3000);
}

document.getElementById('tgChatInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTgChatId(); });

// ── Comment ───────────────────────────────────────────
function toggleCommentBox(el) {
  const wrap = el.nextElementSibling;
  const open = wrap.style.display === 'none';
  wrap.style.display = open ? 'flex' : 'none';
  el.textContent = open ? '✖ Đóng' : '✏️ Viết bình luận';
  if (open) wrap.querySelector('textarea').focus();
}

async function submitComment(postId, groupId, btn) {
  const wrap = btn.closest('.comment-input-wrap');
  const textarea = wrap.querySelector('.comment-textarea');
  const result = wrap.querySelector('.comment-result');
  const message = textarea.value.trim();
  if (!message) return;

  btn.disabled = true;
  result.textContent = '⏳ Đang gửi...';

  try {
    const r = await fetch('/api/comment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ post_id: postId, group_id: groupId, message }),
    });
    const d = await r.json();
    if (d.ok) {
      textarea.value = '';
      result.textContent = '✅ Đã bình luận!';
    } else {
      result.textContent = '❌ ' + (d.error || 'Lỗi');
    }
  } catch {
    result.textContent = '❌ Lỗi kết nối';
  }

  btn.disabled = false;
  setTimeout(() => { result.textContent = ''; }, 4000);
}

// ── Keyword filter ────────────────────────────────────
let keywords = [];

function renderKwTags() {
  document.getElementById('kwTags').innerHTML = keywords.map(kw =>
    `<div class="kw-tag"><span>${kw}</span><span class="remove" onclick="removeKeyword('${kw.replace(/'/g,"\\'")}')">✕</span></div>`
  ).join('');
  const hint = document.getElementById('kwHint');
  hint.textContent = keywords.length ? `Chỉ hiển thị bài chứa ít nhất 1 từ khoá` : '';
}

function addKeyword() {
  const input = document.getElementById('kwInput');
  const val = input.value.trim();
  if (!val || keywords.includes(val)) { input.value = ''; return; }
  keywords.push(val);
  input.value = '';
  renderKwTags();
  applyFilter();
}

function removeKeyword(kw) {
  keywords = keywords.filter(k => k !== kw);
  renderKwTags();
  applyFilter();
}

function matchesKeywords(post) {
  if (!keywords.length) return true;
  const haystack = [
    post.message || '',
    (post.from || {}).name || '',
  ].join(' ').toLowerCase();
  return keywords.some(kw => haystack.includes(kw.toLowerCase()));
}

function highlightText(text) {
  if (!keywords.length) return text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
  let escaped = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
  keywords.forEach(kw => {
    const re = new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    escaped = escaped.replace(re, m => `<span class="kw-highlight">${m}</span>`);
  });
  return escaped;
}

let _allPosts = [];

function applyFilter() {
  const feed = document.getElementById('feed');
  const filtered = _allPosts.filter(matchesKeywords);
  if (!filtered.length) {
    feed.innerHTML = `<div class="empty"><div class="icon">🔍</div><p>Không có bài nào khớp từ khoá</p></div>`;
    return;
  }
  feed.innerHTML = filtered.map(renderPost).join('');
}

document.getElementById('kwInput').addEventListener('keydown', e => { if (e.key === 'Enter') addKeyword(); });

// ── Init ──────────────────────────────────────────────
renderGroupTags();
renderKwTags();
loadTgChatIds();
loadPosts().then(() => startAutoRefresh());
</script>
